name: go-backend-only
description: Go 纯后端编排模板，单 Agent 顺序执行

variables:
  project_name: my-project
  backend_dir: backend/
  test_dir: tests/integration/
  api_base: "http://localhost:8080"

stages:
  - name: explore
    label: Explorer
    agent: explorer
    optional: true

  - name: propose
    label: Propose
    skill: openspec-propose

  - name: review
    label: Review
    agent: reviewer

  - name: gate1
    label: "Gate 1"
    gate: true
    gate_description: "确认方案设计"

  - name: implement
    label: Implement
    agent: implementer

  - name: code-review
    label: Code Review
    agent: code-reviewer

  - name: gate2
    label: "Gate 2"
    gate: true
    gate_description: "确认代码质量"

  - name: integration-test
    label: Int. Test
    agent: test-writer

  - name: archive
    label: Archive
    skill: openspec-archive
