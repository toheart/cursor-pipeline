name: node-fullstack
description: Node.js + React 全栈开发流水线

variables:
  stack_backend: Node.js + Express/Fastify + TypeScript
  stack_frontend: React + TypeScript
  backend_dir: server/
  frontend_dir: client/
  test_dir: server/tests/
  api_base: "http://localhost:3001"
  frontend_url: "http://localhost:3000"

stages:
  - name: explore
    label: Explorer
    agent: explorer
    optional: true

  - name: propose
    label: Propose
    skill: openspec-propose

  - name: review
    label: Review
    agent: reviewer

  - name: gate1
    label: "Gate 1"
    gate: true

  - name: implement
    label: "BE ∥ FE"
    parallel:
      - agent: backend-implementer
        scope: "## Backend Tasks"
      - agent: frontend-implementer
        scope: "## Frontend Tasks"

  - name: code-review
    label: Code Review
    parallel:
      - agent: backend-reviewer
        scope: "{backend_dir}"
      - agent: frontend-reviewer
        scope: "{frontend_dir}"

  - name: gate2
    label: "Gate 2"
    gate: true

  - name: qa-test
    label: QA Test
    agent: qa-tester

  - name: gate3
    label: "Gate 3"
    gate: true

  - name: integration-test
    label: Int. Test
    agent: test-writer

  - name: archive
    label: Archive
    skill: openspec-archive

agents:
  explorer:
    model: claude-4.6-opus-high
    description: 需求探索与方案讨论。
    system: |
      你是全栈技术顾问，擅长 {stack_backend} 和 {stack_frontend}。
      讨论收敛后将结论写入 .cursor/hooks/state/explorer-conclusion.md。

  reviewer:
    model: claude-4.6-opus-high
    description: 变更审查。
    system: |
      你是技术架构审查员。审查 proposal/design/tasks 一致性。

  backend-implementer:
    model: claude-4.6-sonnet-medium
    description: 后端 Node.js 实现。
    scope: "{backend_dir}"
    system: |
      你是 {stack_backend} 后端工程师。只改 {backend_dir} 目录。
      使用 TypeScript 严格模式。

  frontend-implementer:
    model: claude-4.6-sonnet-medium
    description: 前端 React 实现。
    scope: "{frontend_dir}"
    system: |
      你是 {stack_frontend} 前端工程师。只改 {frontend_dir} 目录。

  backend-reviewer:
    model: gpt-5.3-codex
    description: 后端代码审查。
    scope: "{backend_dir}"
    auto_fix: true
    system: |
      你是 {stack_backend} 代码审查员。只审查 {backend_dir}。
      eslint/prettier 问题直接修复。

  frontend-reviewer:
    model: gpt-5.3-codex
    description: 前端代码审查。
    scope: "{frontend_dir}"
    auto_fix: true
    system: |
      你是 {stack_frontend} 代码审查员。只审查 {frontend_dir}。
      prettier/eslint 问题直接修复。

  qa-tester:
    model: gpt-5.2
    description: E2E 测试。
    system: |
      你是 QA 工程师，使用 Playwright 测试。
      环境：前端 {frontend_url}，后端 {api_base}。
    skills:
      - webapp-testing

  test-writer:
    model: claude-4.6-sonnet-medium
    description: API 集成测试。
    system: |
      你是测试工程师，黑盒 HTTP API 验收。
      测试放在 {test_dir}，使用 Jest/Vitest。
